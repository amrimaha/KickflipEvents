# ─────────────────────────────────────────────────────────────────────────────
# Kickflip Crawl Sources Configuration
#
# Edit this file to control which sites are searched, the date window,
# and how searches are batched. Changes take effect on the next crawl run.
#
# To run on demand:
#   curl -X POST https://kickflipevents-production.up.railway.app/api/crawl \
#        -H "Authorization: Bearer <CRON_SECRET>"
# ─────────────────────────────────────────────────────────────────────────────

settings:
  date_window_days: 14     # How many days ahead to search (14 = today + 2 weeks)
  batch_size: 3            # How many sources to combine per Claude API call (saves cost)
  max_sources_per_run: 10  # Hard cap — stops after this many enabled sources


# ─── Sources ──────────────────────────────────────────────────────────────────
# Fields:
#   name        — human label for logs
#   domain      — used in site: search hint to Claude
#   category    — hint for Claude (music | art | food | outdoor | comedy | all)
#   enabled     — set to false to skip without deleting the entry
#   priority    — lower = searched first (1 = highest priority)
# ─────────────────────────────────────────────────────────────────────────────

sources:

  # ── Batch: aggregators  (Tier 1 — high signal density, check daily) ────────
  - name: EverOut Seattle
    domain: everout.com
    category: all
    batch: aggregators
    enabled: true
    priority: 1

  - name: Do206
    domain: do206.com
    category: music,art,comedy
    batch: aggregators
    enabled: true
    priority: 1

  - name: Visit Seattle
    domain: visitseattle.org
    category: all
    batch: aggregators
    enabled: true
    priority: 1

  # ── Batch: ticketing  (highest event density) ─────────────────────────────
  - name: Eventbrite Seattle
    domain: eventbrite.com
    category: all
    batch: ticketing
    enabled: true
    priority: 1

  - name: AXS Seattle
    domain: axs.com
    category: music
    batch: ticketing
    enabled: true
    priority: 1

  - name: Resident Advisor Seattle
    domain: ra.co
    category: music
    batch: ticketing
    enabled: true
    priority: 1

  # ── Batch: media  (local Seattle press) ───────────────────────────────────
  - name: The Stranger
    domain: thestranger.com
    category: music,art,comedy
    batch: media
    enabled: true
    priority: 2

  - name: Seattle Times Events
    domain: seattletimes.com
    category: all
    batch: media
    enabled: true
    priority: 2

  # ── Batch: venues  (specific Seattle venues) ──────────────────────────────
  - name: Jazz Alley
    domain: jazzalley.com
    category: music
    batch: venues
    enabled: true
    priority: 3

  - name: The Crocodile
    domain: thecrocodile.com
    category: music
    batch: venues
    enabled: true
    priority: 3

  - name: Neumos
    domain: neumos.com
    category: music
    batch: venues
    enabled: true
    priority: 3

  - name: Tractor Tavern
    domain: tractortavern.com
    category: music
    batch: venues
    enabled: true
    priority: 3

  - name: Chop Suey
    domain: chopsuey.com
    category: music
    batch: venues
    enabled: true
    priority: 3

  - name: Showbox Seattle
    domain: showboxpresents.com
    category: music
    batch: venues
    enabled: true
    priority: 3

  - name: STG Presents
    domain: stgpresents.org
    category: music,art
    batch: venues
    enabled: true
    priority: 3
    # Covers Neptune, Paramount, Moore Theatre

  - name: The Vera Project
    domain: theveraproject.org
    category: music
    batch: venues
    enabled: true
    priority: 3

  # ── Batch: culture  (arts & museums — weekly crawl sufficient) ─────────────
  - name: Seattle Art Museum
    domain: seattleartmuseum.org
    category: art
    batch: culture
    enabled: true
    priority: 4

  - name: Nordic Museum
    domain: nordicmuseum.org
    category: art
    batch: culture
    enabled: true
    priority: 4

  - name: Pioneer Square
    domain: pioneersquare.org
    category: art
    batch: culture
    enabled: true
    priority: 4

  # ── Batch: extra  (disabled — high noise or API-gated) ────────────────────
  - name: Ticketmaster Seattle
    domain: ticketmaster.com
    category: all
    batch: extra
    enabled: false
    priority: 5
