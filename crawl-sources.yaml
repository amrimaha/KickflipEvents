# ─────────────────────────────────────────────────────────────────────────────
# Kickflip Crawl Sources — v2 (tiered pipeline)
#
# Each source now has:
#   scrape_method: rss | html | disabled
#   url:           the actual page/feed URL to hit (not just domain)
#
# Tiers:
#   Tier 1 (rss)   — direct feed fetch, zero Claude tokens. Fast & free.
#   Tier 2 (html)  — fetch HTML → cheerio strip → single Haiku extract call.
#                    ~2–4K tokens per source. No web_search, no rate limit risk.
#   Tier 3 (auto)  — AI gap-fill runs automatically for thin categories.
#                    Not a source entry. Configured via settings.min_gap_fill.
#
# To run on demand:
#   curl -X POST https://kickflipevents-production.up.railway.app/api/crawl \
#        -H "Authorization: Bearer <CRON_SECRET>"
# ─────────────────────────────────────────────────────────────────────────────

settings:
  date_window_days:  14     # How many days ahead to crawl
  min_gap_fill:       5     # Tier 3 triggers if a category has fewer events than this
  max_html_sources:  15     # Cap: each HTML source costs 1 Haiku call (~3K tokens)
  gap_fill_delay_ms: 35000  # 35s between AI gap-fill calls (rate limit safety)


# ─── Tier 1: RSS feeds ────────────────────────────────────────────────────────
# Zero Claude cost. Pure HTTP fetch + rss-parser. Run first.

sources:

  - name:          EverOut Seattle
    url:           https://everout.com/seattle/events/feed/
    scrape_method: rss
    category:      all
    batch:         aggregators
    enabled:       true
    priority:      1
    crawl_frequency: daily
    notes:         WordPress RSS — highest event density aggregator in Seattle

  - name:          The Stranger
    url:           https://www.thestranger.com/seattle/events/rss
    scrape_method: rss
    category:      music,art,comedy
    batch:         aggregators
    enabled:       true
    priority:      1
    crawl_frequency: daily
    notes:         Seattle alt-weekly, strong music/arts coverage

  - name:          Resident Advisor Seattle
    url:           https://ra.co/events/us/seattle.rss
    scrape_method: rss
    category:      music
    batch:         ticketing
    enabled:       true
    priority:      2
    crawl_frequency: daily
    notes:         Electronic music events; RA publishes RSS per city


  # ─── Tier 2: HTML scrape + Claude extract ─────────────────────────────────
  # fetch() the page → cheerio strip → single Haiku call to extract JSON.
  # NO web_search tool. ~2–4K input tokens per source. No rate limit risk.

