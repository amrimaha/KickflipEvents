[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Crawl cron disabled — Ravi's AWS ECS crawler now handles daily ingestion.
# To re-enable, uncomment the block below.
# [[crons]]
# name = "daily-event-crawl"
# schedule = "0 14 * * *"
# command = "curl -s -X POST http://localhost:$PORT/api/crawl -H 'Authorization: Bearer $CRON_SECRET'"
