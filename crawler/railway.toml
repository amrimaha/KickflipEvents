[build]
builder = "NIXPACKS"

[deploy]
startCommand = "playwright install chromium --with-deps && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Run Playwright crawl daily at 3am UTC (7pm Seattle time previous day)
# Node.js Claude web_search crawl runs at 6am UTC via the API service
[[crons]]
name = "playwright-crawl"
schedule = "0 3 * * *"
command = "curl -s -X POST http://localhost:$PORT/run -H 'Authorization: Bearer $CRON_SECRET' -H 'Content-Type: application/json'"
