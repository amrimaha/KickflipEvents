# ─────────────────────────────────────────────────────────────────────────────
# Kickflip Event Sources  —  single source of truth for all crawl targets
#
# Fields:
#   name               display name (used as source_name in DB + logs)
#   base_url           root of the site (used for same-domain checks)
#   listing_urls       one or more pages to start URL discovery from
#                      omit to use base_url
#   crawl_strategy     auto | static | dynamic   (default: auto)
#   allow_patterns     regex list — event page URLs MUST match at least one
#   deny_patterns      regex list — matching URLs are always skipped
#   max_pages_per_run  cap on event pages crawled per run   (default: 50)
#   seattle_scoped     true → default city=Seattle state=WA when missing
#   respect_robots     true|false → override global RESPECT_ROBOTS_TXT for
#                      this source only. Omit to use the global setting.
#                      Set false only when you have explicit permission or the
#                      site incorrectly disallows legitimate crawlers.
#   crawl_delay_seconds  float → static delay (seconds) between every page
#                        fetch for this source. Use when respect_robots=false
#                        to honour the site's stated Crawl-delay without
#                        reading robots.txt. Ignored when robots check is active
#                        (robots.txt Crawl-delay takes precedence).
#   enabled            false → skip entirely without removing the entry
#   notes              operator notes
# ─────────────────────────────────────────────────────────────────────────────

sources:

  # ════════════════════════════════════════════════════════════════════════════
  # MVP  (enabled: true)
  # ════════════════════════════════════════════════════════════════════════════

  - name: Visit Seattle
    base_url: https://visitseattle.org
    listing_urls:
      - https://visitseattle.org/things-to-do/events/
    crawl_strategy: dynamic
    allow_patterns:
      - '/things-to-do/events/[^/?]+'
    deny_patterns:
      - 'page='
      - 'category='
      - 'tag='
      - 'filter='
    max_pages_per_run: 60
    seattle_scoped: true
    enabled: true
    notes: "Official Seattle tourism event calendar. JS-rendered listing — requires Playwright."

  - name: Everout Seattle
    base_url: https://everout.com
    listing_urls:
      - https://everout.com/seattle/events/
    crawl_strategy: dynamic
    allow_patterns:
      - '/seattle/events/[^/]+/[^/]+'
    deny_patterns:
      - '/articles/'
      - '/guide/'
      - '/where-to/'
    max_pages_per_run: 60
    seattle_scoped: true
    enabled: true
    notes: "Curated Seattle events. SPA — Playwright required. Good JSON-LD."

  - name: Seattle Center
    base_url: https://www.seattlecenter.com
    listing_urls:
      - https://www.seattlecenter.com/events/
    crawl_strategy: auto
    allow_patterns:
      - '/events/detail/'
      - '/events/[a-z0-9-]+-\d{4}'
    deny_patterns:
      - '/events/category/'
      - '/events/venue/'
      - '/events/$'
    max_pages_per_run: 40
    seattle_scoped: true
    enabled: true
    notes: "Campus events at Seattle Center."

  - name: Town Hall Seattle
    base_url: https://www.townhallseattle.org
    listing_urls:
      - https://www.townhallseattle.org/events/
    crawl_strategy: auto
    allow_patterns:
      - '/event/'
    deny_patterns:
      - '/events/$'
      - '/series/'
      - '/program/$'
    max_pages_per_run: 40
    seattle_scoped: true
    respect_robots: false      # WAF returns 403 fetching /robots.txt; actual content is Disallow: (allow-all)
    crawl_delay_seconds: 10    # honour the Crawl-delay: 10 stated in their robots.txt
    enabled: true
    notes: "Lectures, civic + arts events. Good structured data."

  - name: SIFF
    base_url: https://www.siff.net
    listing_urls:
      - https://www.siff.net/calendar
    crawl_strategy: dynamic
    allow_patterns:
      - '/cinema/in-theaters/[^/?]+'
      - '/programs-and-events/[^/?]+'
      - '/festival/[^/?]+'
    deny_patterns:
      - '/about/'
      - '/support/'
      - '/press/'
      - '/cinema/box-office'
      - '/cinema/venue-rentals'
      - '/cinema/cinema-venues'
      - '/festival/submissions'
      - '/festival/archives'
      - '/festival/passes'
    max_pages_per_run: 40
    seattle_scoped: true
    enabled: true
    notes: >
      Seattle film fest + year-round cinema. Calendar at /calendar.
      Individual pages at /cinema/in-theaters/[slug] and /programs-and-events/[slug].

